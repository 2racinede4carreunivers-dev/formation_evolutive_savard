# ===========================================
# Docker Compose - Mode CLI (sans interface graphique)
# ===========================================
# Utilisez ce fichier si vous n'avez pas besoin de l'interface graphique

services:
  math-agent:
    build:
      context: .
      dockerfile: Dockerfile.cli
    container_name: math-agent
    restart: unless-stopped
    
    env_file:
      - .env
    
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - AGENT_MODE=cli
    
    volumes:
      - agent-data:/home/agent/app/data
      - agent-logs:/home/agent/app/logs
      - ./config.yaml:/home/agent/app/config.yaml:ro
      - C:/theorie-mathematique-philippe-thomas-savard-2026:/repo
      - ./local_ai_agent/corpus_actions/exemple_calculs.md:/home/agent/app/local_ai_agent/corpus_actions/exemple_calculs.md:ro
      - ./local_ai_agent/data/corpus.db:/home/agent/app/local_ai_agent/data/corpus.db

    networks:
      - agent-network
    
    depends_on:
      - ollama

    stdin_open: true
    tty: true

    # *** POINT D’ENTRÉE CORRIGÉ ***
    # L’agent principal utilise TON vrai fichier : src/core/agent.py
    command: ["python", "src/core/agent.py"]

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    
    volumes:
      - ollama-data:/root/.ollama
    
    ports:
      - "11434:11434"
    
    networks:
      - agent-network

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command: |
      echo "Attente du demarrage d'Ollama..."
      sleep 30
      OLLAMA_HOST=http://ollama:11434 ollama pull llama3.2 || true
      OLLAMA_HOST=http://ollama:11434 ollama pull qwen2.5-coder:7b || true
      echo "Modeles telecharges!"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - agent-network
    restart: "no"

  # ===========================================
  # SERVICE : CLI INTERACTIF
  # ===========================================
  math-agent-cli:
    build:
      context: .
      dockerfile: Dockerfile.cli
    container_name: math-agent-cli
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - AGENT_MODE=cli
    stdin_open: true
    tty: true

    # Le CLI utilise TON vrai fichier CLI : main_cli.py
    command: ["python", "main_cli.py"]

    networks:
      - agent-network

volumes:
  agent-data:
  agent-logs:
  ollama-data:

networks:
  agent-network:
    driver: bridge
