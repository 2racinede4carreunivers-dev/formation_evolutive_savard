name: Generate Animation
on:
  workflow_dispatch:
    inputs:
      enable_tts:
        description: "Activer la narration audio TTS (utilise le cache assets/audio_cache/ si pas de cle)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      enable_pdf:
        description: "Generer la version PDF"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --quiet pip --upgrade
          pip install --quiet weasyprint
          if [ "${{ inputs.enable_tts }}" = "true" ]; then
            pip install --quiet emergentintegrations --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ || true
          fi

      - name: Check audio cache
        if: ${{ inputs.enable_tts == 'true' }}
        run: |
          if [ -d assets/audio_cache ]; then
            CACHE_COUNT=$(find assets/audio_cache -name "*.mp3" -type f | wc -l)
            echo "Fichiers MP3 en cache (assets/audio_cache) : $CACHE_COUNT"
            if [ "$CACHE_COUNT" = "0" ]; then
              echo "::warning::assets/audio_cache/ existe mais est vide."
            fi
          else
            echo "::warning::assets/audio_cache/ est absent. Le workflow essaiera d'appeler l'API TTS (peut echouer sur compte Emergent Free Tier)."
          fi

      - name: Generate animation
        env:
          REPO_ROOT: "."
          ENABLE_TTS: ${{ inputs.enable_tts }}
          ENABLE_PDF: ${{ inputs.enable_pdf }}
          EMERGENT_LLM_KEY: ${{ secrets._CLE }}
        run: |
          python scripts/generate_animation.py

      - name: Check audio output
        if: ${{ inputs.enable_tts == 'true' }}
        id: audio_check
        run: |
          mkdir -p animation_output/audio
          MP3_COUNT=$(find animation_output/audio -name "*.mp3" -type f | wc -l)
          echo "mp3_count=$MP3_COUNT" >> $GITHUB_OUTPUT
          echo "Nombre de fichiers MP3 generes : $MP3_COUNT"
          if [ "$MP3_COUNT" = "0" ]; then
            echo "::warning::Aucun fichier MP3 n'a ete genere malgre enable_tts=true."
            echo "::warning::Verifiez les logs du step 'Generate animation' pour identifier la cause."
          fi

      - name: Generate YouTube chapters + social media kit
        if: ${{ inputs.enable_tts == 'true' }}
        env:
          REPO_ROOT: "."
        run: |
          pip install --quiet mutagen
          python scripts/generate_youtube_chapters.py || true

      - name: Prepare ALL-IN-ONE bundle
        if: ${{ inputs.enable_tts == 'true' }}
        run: |
          # Cree un dossier animation_bundle/ qui contient TOUT ce qu'il
          # faut pour que l'animation fonctionne avec le son quand
          # l'utilisateur ouvre animation.html depuis son disque.
          BUNDLE=animation_output/animation_bundle
          mkdir -p "$BUNDLE/audio"
          cp animation_output/animation.html "$BUNDLE/"
          cp animation_output/audio/*.mp3 "$BUNDLE/audio/" 2>/dev/null || true
          cp animation_output/youtube_description.txt "$BUNDLE/" 2>/dev/null || true
          cp animation_output/youtube_chapters_only.txt "$BUNDLE/" 2>/dev/null || true
          cp animation_output/social_media_kit.txt "$BUNDLE/" 2>/dev/null || true
          cp animation_output/chapters.json "$BUNDLE/" 2>/dev/null || true
          cp animation_output/animation.pdf "$BUNDLE/" 2>/dev/null || true
          # README explicatif pour l'utilisateur
          cat > "$BUNDLE/README.txt" << 'EOF'
          Animation "L'Univers est au Carre" - Bundle complet
          ====================================================

          CONTENU :
            - animation.html        : lecteur video interactif (a ouvrir
                                      avec votre navigateur)
            - audio/                : 29 fichiers MP3 de narration
            - animation.pdf         : version PDF paginee (optionnelle)
            - youtube_*.txt         : chapitrage YouTube pret a copier
            - social_media_kit.txt  : posts pre-rediges Twitter/LinkedIn/etc
            - chapters.json         : structure des chapitres

          MODE D'EMPLOI :
            1. Dezippez ce fichier dans un dossier
            2. Double-cliquez sur animation.html
            3. Cliquez sur le bouton Play
            IMPORTANT : gardez le dossier audio/ A COTE de animation.html,
                        sinon le son ne sera pas joue.

          Auteur : Philippe Thomas Savard
          Licence : Apache 2.0
          Depot : https://github.com/2racinede4carreunivers-dev/Theorie-mathematique-philippe-thomas-savard-2026
          EOF
          echo "Bundle prepare : $(du -sh $BUNDLE | cut -f1)"
          ls -la "$BUNDLE/"

      - name: Upload ALL-IN-ONE bundle (RECOMMANDE)
        if: ${{ inputs.enable_tts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: animation-bundle-COMPLET
          path: animation_output/animation_bundle/
          if-no-files-found: warn

      - name: Upload HTML animation
        uses: actions/upload-artifact@v4
        with:
          name: animation-html
          path: animation_output/animation.html

      - name: Upload YouTube + social media kit
        if: ${{ inputs.enable_tts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: youtube-social-kit
          path: |
            animation_output/youtube_description.txt
            animation_output/youtube_chapters_only.txt
            animation_output/social_media_kit.txt
            animation_output/chapters.json
          if-no-files-found: ignore

      - name: Upload PDF animation
        if: ${{ inputs.enable_pdf == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: animation-pdf
          path: animation_output/animation.pdf
        continue-on-error: true

      - name: Upload audio files
        if: ${{ inputs.enable_tts == 'true' && steps.audio_check.outputs.mp3_count != '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: animation-audio
          path: animation_output/audio/
          if-no-files-found: ignore

      - name: Upload scene index
        uses: actions/upload-artifact@v4
        with:
          name: animation-scenes-index
          path: animation_output/scenes_index.json

      - name: Summary
        if: always()
        run: |
          echo "## Animation generation summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- enable_tts : ${{ inputs.enable_tts }}" >> $GITHUB_STEP_SUMMARY
          echo "- enable_pdf : ${{ inputs.enable_pdf }}" >> $GITHUB_STEP_SUMMARY
          if [ -f animation_output/scenes_index.json ]; then
            SCENE_COUNT=$(python3 -c "import json; print(len(json.load(open('animation_output/scenes_index.json'))))")
            echo "- Scenes generees : $SCENE_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -d animation_output/audio ]; then
            MP3_COUNT=$(find animation_output/audio -name "*.mp3" -type f | wc -l)
            echo "- Fichiers audio MP3 : $MP3_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts disponibles" >> $GITHUB_STEP_SUMMARY
          echo "- \`animation-html\` : le lecteur video HTML autonome" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.enable_pdf }}" = "true" ]; then
            echo "- \`animation-pdf\` : version PDF paginee" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ inputs.enable_tts }}" = "true" ]; then
            echo "- \`animation-audio\` : fichiers MP3 de narration (si generes)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- \`animation-scenes-index\` : index JSON des scenes" >> $GITHUB_STEP_SUMMARY
