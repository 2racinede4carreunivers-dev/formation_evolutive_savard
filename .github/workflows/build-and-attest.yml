name: Build + Release automatique (avec rapport détaillé)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- LECTURE DE LA VERSION ACTUELLE ---
    - name: Read current version
      id: read_version
      run: |
        if [ ! -f VERSION ]; then echo "1.0.0" > VERSION; fi
        echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

    # --- CALCUL DE LA NOUVELLE VERSION ---
    - name: Determine version bump
      id: bump
      run: |
        MSG="${{ github.event.head_commit.message }}"
        CURRENT="${{ steps.read_version.outputs.version }}"

        IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"

        if echo "$MSG" | grep -qi "major:"; then
          MAJ=$((MAJ+1)); MIN=0; PAT=0
        elif echo "$MSG" | grep -qi "feat:"; then
          MIN=$((MIN+1)); PAT=0
        elif echo "$MSG" | grep -qi "fix:"; then
          PAT=$((PAT+1))
        else
          PAT=$((PAT+1))
        fi

        NEW="$MAJ.$MIN.$PAT"
        echo "new_version=$NEW" >> $GITHUB_OUTPUT

    # --- MISE À JOUR DU FICHIER VERSION ---
    - name: Update VERSION file
      run: |
        echo "${{ steps.bump.outputs.new_version }}" > VERSION

    # --- GÉNÉRATION DU CHANGELOG TEMPORAIRE ---
    - name: Generate temporary CHANGELOG
      id: changelog
      run: |
        cp CHANGELOG.md CHANGELOG_TEMP.md

        echo "" >> CHANGELOG_TEMP.md
        echo "## Version ${{ steps.bump.outputs.new_version }} — $(date +'%Y-%m-%d %H:%M')" >> CHANGELOG_TEMP.md
        echo "- ${{ github.event.head_commit.message }}" >> CHANGELOG_TEMP.md

    # --- INSTALLATION TEXLIVE ---
    - name: Install TeX Live + pygments
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          texlive-latex-base \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-recommended \
          texlive-lang-french \
          python3-pygments

    # --- INSTALLATION ISABELLE ---
    - name: Install Isabelle 2024
      run: |
        curl -L --retry 5 --retry-delay 10 --max-time 600 -o Isabelle2024_linux.tar.gz \
          "https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz" || \
        curl -L --retry 5 --retry-delay 10 --max-time 600 -o Isabelle2024_linux.tar.gz \
          "https://isabelle.in.tum.de/dist/Isabelle2024_linux.tar.gz" || \
        (echo "Echec telechargement" && exit 1)

        tar -xzf Isabelle2024_linux.tar.gz
        mv Isabelle2024 isabelle
        echo "$PWD/isabelle/bin" >> $GITHUB_PATH

    # --- COMPILATION ISABELLE via src/hol/ROOT ---
    - name: Isabelle build
      run: |
        set -o pipefail
        echo "Compilation de la session Isabelle Univers_Au_Carre via src/hol/ROOT"
        isabelle build -v -d src/hol Univers_Au_Carre 2>&1 | tee isabelle_build.log

    # --- COMPILATION LATEX depuis src/tex/ ---
    - name: Compile LaTeX
      run: |
        export TEXINPUTS="./src/tex//:./assets/images//:"
        export TEXMFHOME="$PWD/texmf"

        mkdir -p src/pdf

        for file in src/tex/*.tex; do
          echo "=== Compiling $file ==="
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
        done

    # --- COPIE DES PDF DANS src/pdf/ ---
    - name: Copy compiled PDFs to src/pdf/
      run: |
        for texfile in src/tex/*.tex; do
          basename=$(basename "$texfile" .tex)
          if [ -f "${basename}.pdf" ]; then
            cp "${basename}.pdf" src/pdf/
            echo "  Copie: ${basename}.pdf -> src/pdf/"
          fi
        done
        echo "PDF dans src/pdf/:"
        ls -la src/pdf/*.pdf 2>/dev/null || echo "  Aucun PDF"

    # --- GÉNÉRATION DU RAPPORT D'ATTESTATION ---
    - name: Generate build provenance
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: "src/pdf/*.pdf"

    # --- CRÉATION DU TAG + RELEASE ---
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v-fos-${{ steps.bump.outputs.new_version }}"
        name: "Release v-fos-${{ steps.bump.outputs.new_version }}"
        body_path: CHANGELOG_TEMP.md
        files: |
          src/pdf/*.pdf
          isabelle_build.log
