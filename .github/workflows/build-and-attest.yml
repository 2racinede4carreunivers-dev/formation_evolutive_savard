name: Build Isabelle + LaTeX (HOL + minted + TOC)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install minimal TeX Live + pygments
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          texlive-latex-base \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-recommended \
          python3-pygments

    - name: Install Isabelle
      run: |
        wget https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz
        tar -xzf Isabelle2024_linux.tar.gz
        mv Isabelle2024 isabelle
        echo "$PWD/isabelle/bin" >> $GITHUB_PATH

    - name: Isabelle build
      run: |
        if [ -f ROOT ]; then
          isabelle build -D .
        else
          shopt -s nullglob
          for thy in *.thy; do
            echo "Certification de $thy"
            isabelle build -b -d . "$thy" || true
          done
        fi

    - name: Compile all LaTeX documents (minted + TOC)
      run: |
        shopt -s nullglob
        for file in *.tex; do
          echo "Compilation de $file"
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
        done

    - name: Upload PDFs
      uses: actions/upload-artifact@v4
      with:
        name: pdfs
        path: |
          *.pdf