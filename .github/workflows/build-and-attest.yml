name: Build Isabelle + LaTeX (Optimisé)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Correction automatique des .texx
    - name: Fix .texx extensions
      run: |
        for f in *.texx; do
          mv "$f" "${f%.texx}.tex"
        done

    # Installation rapide de LaTeX (pas texlive-full)
    - name: Install minimal TeX Live
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          texlive-latex-base \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-recommended \
          latexmk

    # Installation Isabelle
    - name: Install Isabelle
      run: |
        wget https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz
        tar -xzf Isabelle2024_linux.tar.gz
        mv Isabelle2024 isabelle
        echo "$PWD/isabelle/bin" >> $GITHUB_PATH

    # Compilation de tous les .tex
    - name: Compile all LaTeX documents
      run: |
        for file in *.tex; do
          echo "Compilation de $file"
          latexmk -pdf -interaction=nonstopmode -f "$file"
        done

    # Certification Isabelle
    - name: Isabelle build
      run: |
        if [ -f ROOT ]; then
          isabelle build -D .
        else
          for thy in *.thy; do
            echo "Certification de $thy"
            isabelle build -b -d . "$thy"
          done
        fi

    # Upload des PDF générés
    - name: Upload PDFs
      uses: actions/upload-artifact@v4
      with:
        name: pdfs
        path: |
          *.pdf