name: Build Isabelle + LaTeX + Release intelligente

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      generate_qa:
        description: 'Générer les Questions/Réponses'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      qa_language:
        description: 'Langue des Q&R'
        required: false
        default: 'fr'
        type: choice
        options:
          - fr
          - en
          - both

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install minimal TeX Live + pygments + français
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-lang-french \
            python3-pygments

      - name: Install SSL certificates
        run: |
          sudo apt-get install -y ca-certificates curl
          sudo update-ca-certificates

      - name: Install Isabelle 2024
        run: |
          echo "Telechargement Isabelle 2024..."
          curl -L --retry 5 --retry-delay 10 --max-time 600 -o Isabelle2024_linux.tar.gz \
            "https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz" || \
          curl -L --retry 5 --retry-delay 10 --max-time 600 -o Isabelle2024_linux.tar.gz \
            "https://isabelle.in.tum.de/dist/Isabelle2024_linux.tar.gz" || \
          (echo "Echec telechargement" && exit 1)

          tar -xzf Isabelle2024_linux.tar.gz
          mv Isabelle2024 isabelle
          echo "$PWD/isabelle/bin" >> $GITHUB_PATH

      - name: Build Isabelle session Univers_Au_Carre
        run: |
          echo "Compilation de la session Isabelle Univers_Au_Carre via ROOT dans src/hol"
          isabelle build -v -d src/hol Univers_Au_Carre

      ###########################################################################
      # 🟦 SECTION LATEX — AJOUT DU SUPPORT PNG (CORRECTION)
      ###########################################################################

      - name: Préparer l’accès aux images PNG
        run: |
          echo "Configuration TEXINPUTS pour les images..."
          export TEXINPUTS="./src/tex//:./assets/images//:"

          echo "Creation d'un fichier graphics.cfg pour graphicx..."
          mkdir -p texmf/tex/latex/local
          printf '%s\n%s\n' '\DeclareGraphicsExtensions{.png,.jpg,.pdf}' '\graphicspath{{./src/tex/}{../../assets/images/}{../../../assets/images/}{./assets/images/}}' > texmf/tex/latex/local/graphics.cfg

          export TEXMFHOME="$PWD/texmf"
          echo "TEXMFHOME=$TEXMFHOME"

      - name: Nettoyer les anciens PDF
        run: |
          mkdir -p src/pdf
          rm -f src/pdf/*.pdf

      - name: Compiler tous les fichiers LaTeX
        run: |
          export TEXINPUTS="./src/tex//:./assets/images//:"
          export TEXMFHOME="$PWD/texmf"

          echo "Compilation forcée du fichier analyse_hypothese_riemann_savard.tex"
          pdflatex -shell-escape -interaction=nonstopmode "src/tex/analyse_hypothese_riemann_savard.tex" || true
          pdflatex -shell-escape -interaction=nonstopmode "src/tex/analyse_hypothese_riemann_savard.tex" || true
          pdflatex -shell-escape -interaction=nonstopmode "src/tex/analyse_hypothese_riemann_savard.tex" || true

          for file in src/tex/*.tex; do
            echo "Compilation de $file"
            pdflatex -shell-escape -interaction=nonstopmode "$file" || true
            pdflatex -shell-escape -interaction=nonstopmode "$file" || true
            pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          done

      - name: Copier les PDF generes par LaTeX
        run: |
          for texfile in src/tex/*.tex; do
            basename=$(basename "$texfile" .tex)
            if [ -f "${basename}.pdf" ]; then
              cp "${basename}.pdf" src/pdf/
              echo "  Copie: ${basename}.pdf"
            fi
          done
          echo "PDF dans src/pdf/:"
          ls -la src/pdf/*.pdf 2>/dev/null || echo "  Aucun PDF"

      ###########################################################################

      - name: Generate attestation report (SHA-256 des PDF)
        run: |
          cd src/pdf
          if ls *.pdf >/dev/null 2>&1; then
            sha256sum *.pdf > ../../attestation_report.txt
          else
            echo "Aucun PDF généré." > ../../attestation_report.txt
          fi

      - name: Generate build metadata
        run: |
          echo "Build provenance" > build_metadata.txt
          echo "Commit SHA : $(git rev-parse HEAD)" >> build_metadata.txt
          echo "Branche : $(git rev-parse --abbrev-ref HEAD)" >> build_metadata.txt
          echo "Date : $(date -u)" >> build_metadata.txt
          echo "" >> build_metadata.txt
          echo "PDF générés :" >> build_metadata.txt
          ls src/pdf/*.pdf >> build_metadata.txt 2>/dev/null || echo "Aucun PDF" >> build_metadata.txt
          echo "" >> build_metadata.txt
          echo "SHA-256 des PDF :" >> build_metadata.txt
          sha256sum src/pdf/*.pdf >> build_metadata.txt 2>/dev/null || echo "Aucun hash" >> build_metadata.txt

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdf-documents
          path: src/pdf/*.pdf

      - name: Upload attestation report
        uses: actions/upload-artifact@v4
        with:
          name: attestation-report
          path: attestation_report.txt

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build_metadata.txt

      - name: Generate build provenance (SLSA v1 - 19 fichiers de la theorie)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            src/tex/postulat_de_univers_carre.tex
            src/tex/analyse_hypothese_riemann_savard.tex
            src/tex/geometry_prime_spectrum.tex
            src/tex/mecanique_harmonique_du_chaos_discret.tex
            src/tex/pilosophy_geometry_of_prime_number.tex
            src/tex/espace_de_philippot.tex
            src/tex/teleosemantique_philosophie_esprit_analogiste.tex
            src/hol/postulat_carre.thy
            src/hol/methode_spectral.thy
            src/hol/methode_de_philippot.thy
            src/hol/mecanique_discret.thy
            src/hol/espace_philippot.thy
            src/pdf/postulat_de_univers_carre.pdf
            src/pdf/analyse_hypothese_riemann_savard.pdf
            src/pdf/geometry_prime_spectrum.pdf
            src/pdf/mecanique_harmonique_du_chaos_discret.pdf
            src/pdf/pilosophy_geometry_of_prime_number.pdf
            src/pdf/espace_de_philippot.pdf
            src/pdf/teleosemantique_philosophie_esprit_analogiste.pdf

  ###########################################################################
  # 🟩 JOB HOL — SECTION CORRIGÉE
  ###########################################################################

  hol_verification:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSL certificates
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl
          sudo update-ca-certificates

      - name: Install Isabelle 2024
        run: |
          echo "Telechargement Isabelle 2024..."
          curl -L --retry 5 --retry-delay 10 --max-time 600 -o Isabelle2024_linux.tar.gz \
            "https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz" || \
            curl -L --retry 5 --retry-delay 10 --max-time 600 -o Isabelle2024_linux.tar.gz \
            "https://isabelle.in.tum.de/dist/Isabelle2024_linux.tar.gz" || \
            (echo "Echec telechargement" && exit 1)

          tar -xzf Isabelle2024_linux.tar.gz
          mv Isabelle2024 isabelle
          echo "$PWD/isabelle/bin" >> $GITHUB_PATH

      - name: Vérification complète du corpus HOL + Rapport HTML
        run: |
          echo "Analyse logique complète du corpus HOL"
          isabelle build -D src/hol -v -o browser_info

      - name: Upload HOL report (HTML complet)
        uses: actions/upload-artifact@v4
        with:
          name: hol-report
          path: ~/.isabelle/Isabelle2024/browser_info/**

      - name: Upload HOL session log
        uses: actions/upload-artifact@v4
        with:
          name: hol-session-log
          path: ~/.isabelle/Isabelle2024/heaps/

  ###########################################################################
  # 🟪 JOB Q&R — NEUTRALISE
  # Code conserve pour visualisation. Ce job ne s'execute pas.
  # Pour reactiver : retirer la ligne "if: false" ci-dessous.
  ###########################################################################

  generate_qa:
    runs-on: ubuntu-latest
    needs: build
    # --- JOB NEUTRALISE ---
    if: false
    # Condition originale (conservee pour reference) :
    # if: ${{ needs.build.result == 'success' && github.event_name != 'pull_request' && github.event.inputs.generate_qa != 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installation des dépendances Q&R
        run: |
          python -m pip install --upgrade pip
          pip install emergentintegrations --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
          if [ -f scripts/requirements.txt ]; then
            pip install -r scripts/requirements.txt
          fi

      - name: Vérification de la clé API
        run: |
          if [ -z "${{ secrets._CLE }}" ]; then
            echo "⚠️  EMERGENT_LLM_KEY non configuré - Génération Q&R désactivée"
            echo "qa_enabled=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Clé API Emergent configurée"
            echo "qa_enabled=true" >> $GITHUB_OUTPUT
          fi
        id: check_key

      - name: Création des répertoires Q&R
        run: |
          mkdir -p qa_bank
          mkdir -p qa_output

      - name: Télécharger les PDF compilés
        uses: actions/download-artifact@v4
        with:
          name: pdf-documents
          path: src/pdf/
        continue-on-error: true

      - name: Génération des Questions/Réponses
        if: steps.check_key.outputs.qa_enabled == 'true'
        env:
          EMERGENT_LLM_KEY: ${{ secrets._CLE }}
          GITHUB_SHA: ${{ github.sha }}
          GENERATION_LANGUAGE: ${{ github.event.inputs.qa_language || 'fr' }}
        run: |
          echo "🧠 Démarrage de la génération Q&R..."
          echo "   Commit: $GITHUB_SHA"
          echo "   Langue: $GENERATION_LANGUAGE"
          echo "   Répertoire: $(pwd)"
          echo "   Fichiers .tex: $(find . -name '*.tex' | wc -l)"
          echo "   Fichiers .thy: $(find . -name '*.thy' | wc -l)"
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/scripts"
          python scripts/qa_generator.py

      - name: Résumé de la génération Q&R
        run: |
          echo "## 📚 Génération Q&R - Théorie Savard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f qa_output/*.json ]; then
            TOTAL=$(cat qa_output/*.json 2>/dev/null | python3 -c "import sys,json; data=json.load(sys.stdin); print(data.get('total_questions', 0))" 2>/dev/null || echo "0")
            echo "**Questions générées:** $TOTAL" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Questions générées:** En attente de configuration EMERGENT_LLM_KEY" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Prochaines étapes" >> $GITHUB_STEP_SUMMARY
          echo "1. Téléchargez l'artifact `qa-generated`" >> $GITHUB_STEP_SUMMARY
          echo "2. Examinez les Q&R dans le fichier Markdown" >> $GITHUB_STEP_SUMMARY
          echo "3. Utilisez `python qa_validator.py --interactive` pour valider" >> $GITHUB_STEP_SUMMARY
          echo "4. Committez la banque mise à jour" >> $GITHUB_STEP_SUMMARY

      - name: Upload Q&R générées
        uses: actions/upload-artifact@v4
        with:
          name: qa-generated-${{ github.sha }}
          path: |
            qa_output/
            qa_bank/qa_bank.db
          retention-days: 30
          if-no-files-found: warn

  ###########################################################################
  # 🟦 JOB RELEASE
  ###########################################################################

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download attestation report
        uses: actions/download-artifact@v4
        with:
          name: attestation-report
          path: .

      - name: Download build metadata
        uses: actions/download-artifact@v4
        with:
          name: build-metadata
          path: .

  ###########################################################################
  # 🟧 JOB CHANGELOG
  ###########################################################################

  update_changelog:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lire la note si elle existe
        id: note
        run: |
          NOTE_FILE=".git/.note"
          if [ -f "$NOTE_FILE" ]; then
            echo "note_exists=true" >> $GITHUB_OUTPUT
            source "$NOTE_FILE"
            echo "title=$title" >> $GITHUB_OUTPUT
            echo "summary=$summary" >> $GITHUB_OUTPUT
            echo "date=$date" >> $GITHUB_OUTPUT
            echo "tag=$tag" >> $GITHUB_OUTPUT
            echo "previous_tag=$previous_tag" >> $GITHUB_OUTPUT
          else
            echo "note_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Mettre à jour le CHANGELOG
        run: |
          echo "" >> CHANGELOG.md
          echo "## Release ${{ steps.note.outputs.tag }}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          if [ "${{ steps.note.outputs.note_exists }}" = "true" ]; then
            echo "- **Titre** : ${{ steps.note.outputs.title }}" >> CHANGELOG.md
            echo "- **Résumé** : ${{ steps.note.outputs.summary }}" >> CHANGELOG.md
            echo "- **Date** : ${{ steps.note.outputs.date }}" >> CHANGELOG.md
            echo "- **Tag précédent** : ${{ steps.note.outputs.previous_tag }}" >> CHANGELOG.md
          else
            echo "- Mise à jour sans note fournie." >> CHANGELOG.md
          fi

          echo "" >> CHANGELOG.md

      - name: Supprimer la note après utilisation
        run: |
          if [ -f ".git/.note" ]; then
            rm .git/.note
          fi

      - name: Commit et push du CHANGELOG mis à jour
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add CHANGELOG.md
          git commit -m "Mise à jour automatique du CHANGELOG"
          git push
