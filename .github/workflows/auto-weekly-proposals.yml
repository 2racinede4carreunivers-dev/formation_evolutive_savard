# ╔══════════════════════════════════════════════════════════════════════╗
# ║  WORKFLOW NEUTRALISE — Code conserve pour visualisation            ║
# ║  Ce workflow n'est plus actif sur ce depot (formation_evolutive).  ║
# ║  Les triggers automatiques sont desactives.                        ║
# ║  Le code source est preserve pour demontrer la structure du        ║
# ║  systeme de propositions hebdomadaires aux recruteurs.             ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# Workflow automatique hebdomadaire - Propositions .tex/.thy
# Theorie Mathematique Philippe Thomas Savard 2026
#
# Frequence originale: Chaque vendredi a 14h00 UTC
# Tache: Analyse la banque Q&R et propose des ameliorations pour 1 fichier .tex ou .thy

name: "[ARCHIVE] Auto Propositions Hebdomadaires"

on:
  # --- TRIGGERS NEUTRALISES ---
  # Le declencheur automatique ci-dessous est desactive.
  # Decommenter les lignes suivantes pour reactiver :
  #
  # schedule:
  #   - cron: '0 14 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly_proposals:
    runs-on: ubuntu-latest
    # --- JOB NEUTRALISE ---
    # Ce job ne s'executera pas. Retirer la ligne ci-dessous pour reactiver.
    if: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dependances
        run: |
          python -m pip install --upgrade pip
          pip install emergentintegrations --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/

      - name: Generation des propositions hebdomadaires
        env:
          EMERGENT_LLM_KEY: ${{ secrets._CLE }}
        run: |
          python3 scripts/auto_weekly_proposals.py

      - name: Commit et push des propositions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -d proposals ]; then
            git add proposals/
            git diff --staged --quiet || git commit -m "Auto: Proposition hebdomadaire $(date +%Y-%m-%d)"
            git push || echo "Rien a pousser"
          fi

      - name: Resume
        run: |
          echo "## Propositions Hebdomadaires" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Proposition amelioration generee dans proposals/" >> $GITHUB_STEP_SUMMARY
